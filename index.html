<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🎬 AI Video Canvas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050912;font-family:Inter,system-ui,sans-serif;overflow:hidden;color:#e2e8f0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#1e3455;border-radius:2px}
input,textarea,select{outline:none;font-family:inherit}
select option{background:#0a1628}
.node{position:absolute;border-radius:12px;user-select:none;cursor:grab;box-shadow:0 4px 24px #00000099}
.node:active{cursor:grabbing}
.port{position:absolute;width:14px;height:14px;border-radius:50%;border:2.5px solid #050912;cursor:crosshair;z-index:5;top:50%;transform:translateY(-50%)}
.port.in{left:-7px}
.port.out{right:-7px}
.node-header{padding:8px 12px 6px;display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.node-body{padding:6px 12px 10px}
.ta{width:100%;background:#0a1628;border:1px solid #1e3455;color:#e2e8f0;border-radius:7px;padding:7px 9px;font-size:12px;resize:none;line-height:1.6}
.sel{width:100%;background:#0a1628;border:1px solid #1e3455;color:#e2e8f0;border-radius:7px;padding:6px 8px;font-size:12px}
.btn{padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit}
.upload-label{display:block;text-align:center;cursor:pointer;border-radius:7px;padding:8px;font-size:10px}
.ctx-menu{position:fixed;background:#0a1628;border:1px solid #1e3455;border-radius:11px;box-shadow:0 8px 40px #000c;z-index:500;padding:5px;min-width:200px}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#94a3b8}
.ctx-item:hover{background:#1e3455}
.model-picker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a1628;border:1px solid #1e3455;border-radius:13px;box-shadow:0 8px 50px #000d;z-index:600;padding:8px;min-width:280px}
.mp-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer}
.mp-item:hover{background:#1e3455}
.topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#07101e;border-bottom:1px solid #0d1e33;display:flex;align-items:center;padding:0 16px;gap:10px;z-index:200}
.keys-panel{position:fixed;top:48px;left:0;right:0;background:#060e1c;border-bottom:1px solid #0d1e33;padding:12px 16px;z-index:199}
.log-panel{position:fixed;bottom:12px;right:12px;width:268px;background:#07101eee;border:1px solid #0d1e33;border-radius:10px;z-index:200;backdrop-filter:blur(6px)}
.run-btn{display:flex;align-items:center;gap:8px;padding:7px 26px;background:#d4f542;border-radius:99px;border:none;cursor:pointer;font-weight:700;font-size:13px;color:#050912;box-shadow:0 2px 20px #d4f54240;font-family:inherit}
.run-btn:disabled{background:#1a1a2e;color:#475569;cursor:not-allowed;box-shadow:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const IMG_MODELS={
  flux_schnell:{label:"FLUX.1 Schnell",badge:"FREE",   bc:"#22c55e",prov:"HuggingFace",color:"#f59e0b",kid:"hf"},
  flux_dev:    {label:"FLUX.1 Dev",    badge:"FREE★",  bc:"#84cc16",prov:"HuggingFace",color:"#f97316",kid:"hf"},
  imagen3:     {label:"Imagen 3",      badge:"PAID",   bc:"#f97316",prov:"Google",     color:"#0ea5e9",kid:"gemini"},
  gpt_image2:  {label:"GPT Image 2",   badge:"PAID",   bc:"#f97316",prov:"OpenAI",     color:"#10a37f",kid:"openai"},
};
const VID_MODELS={
  ltx:     {label:"LTX-Video",     badge:"FREE",  bc:"#22c55e",prov:"HuggingFace",color:"#a3e635",kid:"hf"},
  hunyuan: {label:"HunyuanVideo",  badge:"FREE",  bc:"#22c55e",prov:"HuggingFace",color:"#06b6d4",kid:"hf"},
  wan_fal: {label:"Wan 2.1 (fal)", badge:"FREE★", bc:"#84cc16",prov:"fal.ai",    color:"#f59e0b",kid:"fal"},
  kling:   {label:"Kling 2.1",     badge:"PAID",  bc:"#f97316",prov:"fal.ai",    color:"#a855f7",kid:"fal"},
  veo3:    {label:"Veo 3.1",       badge:"PAID",  bc:"#f97316",prov:"Google",    color:"#ef4444",kid:"gemini"},
};
const NODE_CFG={
  prompt:   {label:"Prompt",         icon:"T",  color:"#6366f1",bg:"#0e0e1a"},
  costume:  {label:"Phục Trang",     icon:"👗", color:"#ec4899",bg:"#150514"},
  props:    {label:"Đạo Cụ",         icon:"🎭", color:"#f59e0b",bg:"#150f04"},
  style:    {label:"Style",          icon:"🎨", color:"#8b5cf6",bg:"#0d0514"},
  camera:   {label:"Camera",         icon:"🎥", color:"#10b981",bg:"#04140e"},
  image:    {label:"Image Ref",      icon:"🖼", color:"#0ea5e9",bg:"#041420"},
  ref_pose: {label:"Ref: Pose/3D",   icon:"🧍", color:"#818cf8",bg:"#0b0b1c"},
  ref_cam:  {label:"Ref: Cam Move",  icon:"🎞", color:"#34d399",bg:"#04140e"},
  ref_style:{label:"Ref: Style",     icon:"🖌", color:"#f472b6",bg:"#140510"},
  ref_char: {label:"Ref: Character", icon:"👤", color:"#fb923c",bg:"#140904"},
  imggen:   {label:"Image Generation",icon:"⊞",color:"#06b6d4",bg:"#041420"},
  videogen: {label:"Video Generation",icon:"▶",color:"#f97316",bg:"#140a04"},
};
const MENU_ITEMS=[
  {type:"prompt",label:"Prompt Box",icon:"T"},
  {type:"imggen",label:"Image Generation",icon:"⊞"},
  {type:"videogen",label:"Video Generation",icon:"▶"},
  {type:"image",label:"Image Reference",icon:"🖼"},
  {type:"costume",label:"Phục Trang",icon:"👗"},
  {type:"props",label:"Đạo Cụ",icon:"🎭"},
  {type:"style",label:"Style",icon:"🎨"},
  {type:"camera",label:"Camera",icon:"🎥"},
  {type:"ref_pose",label:"Ref: Pose/3D",icon:"🧍"},
  {type:"ref_cam",label:"Ref: Cam",icon:"🎞"},
  {type:"ref_style",label:"Ref: Style",icon:"🖌"},
  {type:"ref_char",label:"Ref: Character",icon:"👤"},
];
const STYLES=["Cinematic","Anime","Realistic","Noir","Cyberpunk","Fantasy","Documentary","Fashion"];
const CAMERAS=["Dolly In","Zoom Out","Pan Left","Pan Right","Overhead","Handheld","Orbit 360","Tracking Shot"];
const KEY_DEFS=[
  {id:"hf",       label:"🟡 HuggingFace", ph:"hf_..."},
  {id:"gemini",   label:"🔵 Gemini",      ph:"AIza..."},
  {id:"openai",   label:"🟢 OpenAI",      ph:"sk-..."},
  {id:"fal",      label:"🟣 fal.ai",      ph:"fal_..."},
  {id:"replicate",label:"🔴 Replicate",   ph:"r8_..."},
  {id:"anthropic",label:"🟠 Anthropic",   ph:"sk-ant-..."},
];

// ── State ────────────────────────────────────────────────────────────────────
let nodeId=10;
const genId=()=>"n"+(nodeId++);

let state={
  nodes:[
    {id:"n1",type:"prompt",  x:80, y:240,data:{text:""}},
    {id:"n2",type:"imggen",  x:460,y:150,data:{status:"idle",imgUrl:"",model:"flux_schnell"}},
    {id:"n3",type:"videogen",x:900,y:150,data:{status:"idle",videoUrl:"",model:"ltx"}},
  ],
  edges:[{id:"e1",from:"n1",to:"n2"},{id:"e2",from:"n2",to:"n3"}],
  keys:{hf:"",gemini:"",openai:"",fal:"",replicate:"",anthropic:""},
  keyStatus:{hf:"idle",gemini:"idle",openai:"idle",fal:"idle",replicate:"idle",anthropic:"idle"},
  showKeys:false,
  pan:{x:60,y:0},
  zoom:1,
  running:false,
  log:[],
  ctxMenu:null,
  modelPicker:null,
  wire:null,
};

// drag/pan refs
let dragNode=null,dragOrig=null,panStart=null,wireStart=null;

function defData(t){
  if(t==="prompt")return{text:""};
  if(t==="imggen")return{status:"idle",imgUrl:"",model:"flux_schnell"};
  if(t==="videogen")return{status:"idle",videoUrl:"",model:"ltx"};
  if(t==="style")return{value:"Cinematic"};
  if(t==="camera")return{value:"Dolly In"};
  return{label:"",b64:"",videoUrl:"",isVideo:false,text:""};
}
function nodeW(n){
  if(n.type==="imggen"||n.type==="videogen") return(n.data.imgUrl||n.data.videoUrl)?340:300;
  return 255;
}
function nodeH(n){
  if(n.type==="prompt")return 145;
  if(n.type==="imggen")return n.data.imgUrl?320:175;
  if(n.type==="videogen")return n.data.videoUrl?340:175;
  if(["image","ref_pose","ref_cam","ref_style","ref_char"].includes(n.type))return(n.data.b64||n.data.videoUrl)?205:130;
  return 108;
}
function portPos(n,side){
  const h=nodeH(n),w=nodeW(n);
  return side==="out"?{x:n.x+w,y:n.y+h/2}:{x:n.x,y:n.y+h/2};
}
function toCanvas(cx,cy){
  return{x:(cx-state.pan.x)/state.zoom,y:(cy-state.pan.y)/state.zoom};
}
function addLog(m){
  state.log=[...state.log.slice(-60),{t:new Date().toLocaleTimeString("vi"),m}];
  render();
}
function updNode(id,patch){
  state.nodes=state.nodes.map(n=>n.id===id?Object.assign({},n,{data:Object.assign({},n.data,patch)}):n);
}

// ── API calls ────────────────────────────────────────────────────────────────
// v2.1 — fixed FLUX endpoint

async function callFlux(p,model,k){
  const mid=model==="flux_schnell"?"black-forest-labs/FLUX.1-schnell":"black-forest-labs/FLUX.1-dev";
  addLog("🔄 Calling HF: "+mid);
  let r;
  try{
    r=await fetch("https://api-inference.huggingface.co/models/"+mid,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+k,
        "Content-Type":"application/json",
        "x-wait-for-model":"true"
      },
      body:JSON.stringify({inputs:p})
    });
  }catch(fetchErr){
    throw new Error("Network error — check CORS or internet: "+fetchErr.message);
  }
  addLog("📡 HF response status: "+r.status);
  if(r.status===503){
    addLog("⏳ Model loading, retrying in 20s…");
    await sleep(20000);
    return callFlux(p,model,k);
  }
  if(!r.ok){
    const txt=await r.text();
    throw new Error("HF "+r.status+": "+txt.slice(0,120));
  }
  const blob=await r.blob();
  addLog("📦 Blob type: "+blob.type+" size: "+blob.size);
  if(blob.size<100)throw new Error("Response too small, likely an error");
  return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=rej;rd.readAsDataURL(blob);});
}
async function callImagen(p,k){
  const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key="+k,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({instances:[{prompt:p}],parameters:{sampleCount:1,aspectRatio:"16:9"}})
  });
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  const b64=d.predictions&&d.predictions[0]&&d.predictions[0].bytesBase64Encoded;
  if(!b64)throw new Error("No image from Imagen 3");
  return"data:image/png;base64,"+b64;
}
async function callGPTImg(p,k){
  const r=await fetch("https://api.openai.com/v1/images/generations",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+k},
    body:JSON.stringify({model:"gpt-image-2",prompt:p,n:1,size:"1024x1024",response_format:"b64_json"})
  });
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return"data:image/png;base64,"+d.data[0].b64_json;
}
async function blobToDataURL(blob){
  return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=rej;rd.readAsDataURL(blob);});
}
async function callLTX(p,k){
  addLog("🎬 LTX-Video generating…");
  const r=await fetch("https://api-inference.huggingface.co/models/Lightricks/LTX-Video",{
    method:"POST",
    headers:{Authorization:"Bearer "+k,"Content-Type":"application/json","x-wait-for-model":"true"},
    body:JSON.stringify({inputs:p})
  });
  if(r.status===503)throw new Error("LTX model loading, wait 30s then retry");
  if(!r.ok)throw new Error("LTX error: "+(await r.text()).slice(0,80));
  const blob=await r.blob();return blobToDataURL(blob);
}
async function callHunyuan(p,k){
  addLog("🎬 HunyuanVideo generating…");
  const r=await fetch("https://api-inference.huggingface.co/models/tencent/HunyuanVideo",{
    method:"POST",
    headers:{Authorization:"Bearer "+k,"Content-Type":"application/json","x-wait-for-model":"true"},
    body:JSON.stringify({inputs:p})
  });
  if(r.status===503)throw new Error("HunyuanVideo loading, wait 30s then retry");
  if(!r.ok)throw new Error("HunyuanVideo error: "+(await r.text()).slice(0,80));
  const blob=await r.blob();return blobToDataURL(blob);
}
async function callWanFal(p,k){
  addLog("🎬 Wan 2.1 (fal.ai) submitting…");
  const r=await fetch("https://queue.fal.run/fal-ai/wan/v2.1/1.3b/text-to-video",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Key "+k},
    body:JSON.stringify({prompt:p,num_frames:81,frames_per_second:16,resolution:"720p"})
  });
  const d=await r.json();
  if(!d.request_id)throw new Error("Wan fal: no request_id");
  for(let i=0;i<60;i++){
    await sleep(4000);
    const p2=await fetch("https://queue.fal.run/fal-ai/wan/v2.1/1.3b/text-to-video/requests/"+d.request_id,{headers:{"Authorization":"Key "+k}});
    const pd=await p2.json();
    if(pd.status==="COMPLETED"){const u=pd.output&&((pd.output.video&&pd.output.video.url)||(pd.output.videos&&pd.output.videos[0]&&pd.output.videos[0].url));if(u){addLog("✅ Wan 2.1 done!");return u;}throw new Error("No URL");}
    if(pd.status==="FAILED")throw new Error(pd.error||"Failed");
    addLog("⏳ Wan fal: "+(i+1)*4+"s");
  }throw new Error("Wan fal timeout");
}
async function callKling(p,k){
  addLog("🎬 Kling 2.1 submitting…");
  const r=await fetch("https://queue.fal.run/fal-ai/kling-video/v2.1/pro/text-to-video",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Key "+k},
    body:JSON.stringify({prompt:p,duration:"5",aspect_ratio:"16:9"})
  });
  const d=await r.json();if(!d.request_id)throw new Error("Kling: no request_id");
  for(let i=0;i<50;i++){
    await sleep(5000);
    const p2=await fetch("https://queue.fal.run/fal-ai/kling-video/v2.1/pro/text-to-video/requests/"+d.request_id,{headers:{"Authorization":"Key "+k}});
    const pd=await p2.json();
    if(pd.status==="COMPLETED"){const u=pd.output&&pd.output.video&&pd.output.video.url;if(u){addLog("✅ Kling done!");return u;}throw new Error("No URL");}
    if(pd.status==="FAILED")throw new Error(pd.error||"Failed");
    addLog("⏳ Kling: "+(i+1)*5+"s");
  }throw new Error("Kling timeout");
}
async function callVeo(p,k){
  addLog("🎬 Veo 3.1 starting…");
  const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/veo-3.0-generate-preview:generateVideos?key="+k,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:{text:p},generationConfig:{durationSeconds:8,aspectRatio:"16:9"}})
  });
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  for(let i=0;i<40;i++){
    await sleep(5000);
    const p2=await fetch("https://generativelanguage.googleapis.com/v1beta/"+d.name+"?key="+k);
    const pd=await p2.json();
    if(pd.done){const u=pd.response&&pd.response.generatedVideos&&pd.response.generatedVideos[0]&&pd.response.generatedVideos[0].video&&pd.response.generatedVideos[0].video.uri;if(u){addLog("✅ Veo done!");return u+"?key="+k;}throw new Error("No URI");}
    addLog("⏳ Veo: "+(i+1)*5+"s");
  }throw new Error("Veo timeout");
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// Key validators
const validators={
  hf:async k=>{const r=await fetch("https://huggingface.co/api/whoami-v2",{headers:{Authorization:"Bearer "+k}});if(!r.ok)throw new Error("Invalid");},
  gemini:async k=>{const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models?key="+k);if(!r.ok)throw new Error("Invalid");},
  openai:async k=>{const r=await fetch("https://api.openai.com/v1/models",{headers:{Authorization:"Bearer "+k}});if(!r.ok)throw new Error("Invalid");},
  fal:async k=>{const r=await fetch("https://queue.fal.run/fal-ai/flux/schnell",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Key "+k},body:JSON.stringify({prompt:"test"})});if(r.status===401||r.status===403)throw new Error("Invalid");},
  replicate:async k=>{const r=await fetch("https://api.replicate.com/v1/account",{headers:{Authorization:"Bearer "+k}});if(!r.ok)throw new Error("Invalid");},
  anthropic:async k=>{const r=await fetch("https://api.anthropic.com/v1/models",{headers:{"x-api-key":k,"anthropic-version":"2023-06-01"}});if(!r.ok)throw new Error("Invalid");},
};
async function checkKey(id){
  const val=(state.keys[id]||"").trim();
  if(!val){state.keyStatus[id]="idle";render();return;}
  state.keyStatus[id]="checking";render();
  try{await validators[id](val);state.keyStatus[id]="ok";}
  catch(e){state.keyStatus[id]="error";}
  render();
}

// ── Run pipeline ─────────────────────────────────────────────────────────────
// ── Shared helpers ────────────────────────────────────────────────────────────
async function buildPrompt(){
  let fp="";
  state.nodes.forEach(n=>{
    if(n.type==="prompt"&&n.data.text)fp+=n.data.text+". ";
    if(n.type==="costume"&&n.data.text)fp+="Costume: "+n.data.text+". ";
    if(n.type==="props"&&n.data.text)fp+="Props: "+n.data.text+". ";
    if(n.type==="style"&&n.data.value)fp+="Style: "+n.data.value+". ";
    if(n.type==="camera"&&n.data.value)fp+="Camera: "+n.data.value+". ";
  });
  fp=fp.trim()||"A cinematic scene, high quality, detailed";
  if(state.keys.anthropic){
    addLog("🤖 Claude enhancing prompt…");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":state.keys.anthropic,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
          messages:[{role:"user",content:"Write ONE cinematic prompt (English,60-90 words) from: "+fp+". Output ONLY the prompt."}]})
      });
      const d=await r.json();
      if(d.content&&d.content[0])fp=d.content[0].text.trim();
      addLog("✅ Prompt: "+fp.slice(0,50)+"…");
    }catch(e){addLog("⚠️ Claude error, using raw prompt");}
  }
  return fp;
}

async function runImageNodes(fp){
  const imgNodes=state.nodes.filter(n=>n.type==="imggen");
  for(const nd of imgNodes){
    const mc=IMG_MODELS[nd.data.model];
    const k=state.keys[mc.kid];
    if(!k){addLog("❌ Need "+mc.kid+" key for "+mc.label);updNode(nd.id,{status:"error"});render();continue;}
    updNode(nd.id,{status:"loading",imgUrl:""});render();
    addLog("🖼 "+mc.label+"…");
    try{
      let url;
      if(nd.data.model==="flux_schnell"||nd.data.model==="flux_dev")url=await callFlux(fp,nd.data.model,k);
      else if(nd.data.model==="imagen3")url=await callImagen(fp,k);
      else url=await callGPTImg(fp,k);
      if(!url)throw new Error("No image URL returned");
      updNode(nd.id,{status:"done",imgUrl:url});
      addLog("✅ Image done!");
    }catch(e){
      addLog("❌ Image error: "+e.message);
      updNode(nd.id,{status:"error"});
    }
    render();
  }
}

async function runVideoNodes(fp){
  const vidNodes=state.nodes.filter(n=>n.type==="videogen");
  for(const nd of vidNodes){
    const mc=VID_MODELS[nd.data.model];
    const k=state.keys[mc.kid];
    if(!k){addLog("❌ Need "+mc.kid+" key for "+mc.label);updNode(nd.id,{status:"error"});render();continue;}
    updNode(nd.id,{status:"loading",videoUrl:""});render();
    try{
      let url;
      if(nd.data.model==="ltx")url=await callLTX(fp,k);
      else if(nd.data.model==="hunyuan")url=await callHunyuan(fp,k);
      else if(nd.data.model==="wan_fal")url=await callWanFal(fp,k);
      else if(nd.data.model==="kling")url=await callKling(fp,k);
      else url=await callVeo(fp,k);
      updNode(nd.id,{status:"done",videoUrl:url});addLog("✅ Video done!");
    }catch(e){addLog("❌ "+e.message);updNode(nd.id,{status:"error"});}
    render();
  }
}

async function runPipeline(){
  if(state.running)return;
  state.running=true;render();
  addLog("🚀 Run All started");
  const fp=await buildPrompt();
  await runImageNodes(fp);
  await runVideoNodes(fp);
  addLog("🎉 Pipeline complete!");
  state.running=false;render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el[k.toLowerCase()]=v;
    else if(k==="class")el.className=v;
    else if(k==="html")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{if(c==null||c===false)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(c));else if(c instanceof Node)el.appendChild(c);});
  return el;
}

function renderNode(node){
  const cfg=NODE_CFG[node.type];
  if(!cfg)return null;
  const W=nodeW(node);
  const isGen=node.type==="imggen"||node.type==="videogen";
  const mmap=isGen?(node.type==="imggen"?IMG_MODELS:VID_MODELS):null;
  const curM=isGen?mmap[node.data.model]:null;

  const el=h("div",{
    class:"node",
    style:{left:node.x+"px",top:node.y+"px",width:W+"px",background:cfg.bg,borderTop:"2.5px solid "+cfg.color,border:"1px solid "+cfg.color+"30",borderRadius:"12px"}
  });

  // Header
  const hdr=h("div",{class:"node-header",style:{borderBottom:"1px solid "+cfg.color+"20"}},
    h("span",{style:{color:cfg.color,fontSize:"12px"}},cfg.icon),
    h("span",{style:{color:cfg.color}},cfg.label)
  );
  if(isGen){
    const mb=h("button",{class:"btn",style:{marginLeft:"auto",background:cfg.color+"20",border:"1px solid "+cfg.color+"50",color:cfg.color}},
      (curM?curM.label:"Model")+" ▾"
    );
    mb.onclick=e=>{e.stopPropagation();state.modelPicker={nodeId:node.id,kind:node.type};render();};
    hdr.appendChild(mb);
  }
  const delBtn=h("button",{class:"btn",style:{background:"transparent",border:"none",color:"#475569",padding:"0 3px",fontSize:"13px",marginLeft:isGen?"2px":"auto"}}, "✕");
  delBtn.onclick=e=>{e.stopPropagation();state.nodes=state.nodes.filter(n=>n.id!==node.id);state.edges=state.edges.filter(e=>e.from!==node.id&&e.to!==node.id);render();};
  hdr.appendChild(delBtn);
  el.appendChild(hdr);

  // Body
  const body=h("div",{class:"node-body"});
  body.onmousedown=e=>e.stopPropagation();
  body.appendChild(renderNodeBody(node));
  el.appendChild(body);

  // Ports
  const inPort=h("div",{class:"port in",style:{background:cfg.color}});
  inPort.onmousedown=e=>{e.stopPropagation();const pp=portPos(node,"in");wireStart={fromNode:node.id};state.wire={x1:pp.x,y1:pp.y,x2:pp.x,y2:pp.y};render();};
  el.appendChild(inPort);
  const outPort=h("div",{class:"port out",style:{background:cfg.color}});
  outPort.onmousedown=e=>{e.stopPropagation();const pp=portPos(node,"out");wireStart={fromNode:node.id};state.wire={x1:pp.x,y1:pp.y,x2:pp.x,y2:pp.y};render();};
  el.appendChild(outPort);

  // Drag
  el.onmousedown=e=>{
    if(e.button!==0)return;
    e.stopPropagation();
    dragNode=node.id;dragOrig={mx:e.clientX,my:e.clientY,ox:node.x,oy:node.y};
  };
  return el;
}

function renderNodeBody(node){
  const t=node.type,d=node.data;
  const ta={class:"ta"};

  if(t==="prompt"){
    const el=h("textarea",Object.assign({},ta,{style:{height:"78px"},placeholder:"Describe what you want to create…"}));
    el.value=d.text||"";el.oninput=e=>{updNode(node.id,{text:e.target.value});};return el;
  }
  if(t==="costume"){
    const el=h("textarea",Object.assign({},ta,{style:{height:"56px"},placeholder:"Costume & wardrobe details…"}));
    el.value=d.text||"";el.oninput=e=>updNode(node.id,{text:e.target.value});return el;
  }
  if(t==="props"){
    const el=h("textarea",Object.assign({},ta,{style:{height:"56px"},placeholder:"Props, setting, environment…"}));
    el.value=d.text||"";el.oninput=e=>updNode(node.id,{text:e.target.value});return el;
  }
  if(t==="style"){
    const el=h("select",{class:"sel"});
    el.value=d.value;STYLES.forEach(s=>{const o=h("option",{},[s]);if(s===d.value)o.selected=true;el.appendChild(o);});
    el.onchange=e=>updNode(node.id,{value:e.target.value});return el;
  }
  if(t==="camera"){
    const el=h("select",{class:"sel"});

    el.onchange=e=>updNode(node.id,{value:e.target.value});return el;
  }
  if(["image","ref_pose","ref_cam","ref_style","ref_char"].includes(t)){
    const cfg=NODE_CFG[t];
    const isVid=t==="ref_cam";
    const has=d.label;
    const wrap=h("div",{});
    if(t.startsWith("ref")){
      const descs={ref_pose:"3D/mockup → pose & position ref",ref_cam:"Upload video for camera ref",ref_style:"Color & lighting reference",ref_char:"Character consistency ref"};
      wrap.appendChild(h("div",{style:{fontSize:"10px",color:"#475569",marginBottom:"5px",lineHeight:"1.4"}},descs[t]));
    }
    const inp=h("input",{type:"file",accept:isVid?"image/*,video/*":"image/*",id:"fu_"+node.id,style:{display:"none"}});
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{if(f.type.startsWith("video/"))updNode(node.id,{label:f.name,videoUrl:ev.target.result,b64:"",isVideo:true});else updNode(node.id,{label:f.name,b64:ev.target.result.split(",")[1],videoUrl:"",isVideo:false});render();};rd.readAsDataURL(f);};
    wrap.appendChild(inp);
    const lbl=h("label",{for:"fu_"+node.id,class:"upload-label",style:{background:has?"#0d2a1a":"#0a1628",border:"1.5px dashed "+(has?"#22c55e":cfg.color+"50"),color:has?"#22c55e":cfg.color}},has?"✅ "+d.label.slice(0,22):(isVid?"📁 Upload image/video":"📁 Upload image"));
    wrap.appendChild(lbl);
    if(d.b64&&!d.isVideo){const img=h("img",{src:"data:image/jpeg;base64,"+d.b64,style:{width:"100%",marginTop:"6px",borderRadius:"6px",objectFit:"cover",maxHeight:"110px"}});wrap.appendChild(img);}
    if(d.videoUrl&&d.isVideo){const vid=document.createElement("video");vid.src=d.videoUrl;vid.muted=true;Object.assign(vid.style,{width:"100%",marginTop:"6px",borderRadius:"6px",maxHeight:"110px"});wrap.appendChild(vid);}
    if(has){const rm=h("button",{class:"btn",style:{marginTop:"5px",width:"100%",background:"transparent",border:"1px solid #1e3455",color:"#475569",padding:"3px"}},"✕ Remove");rm.onclick=()=>{updNode(node.id,{label:"",b64:"",videoUrl:"",isVideo:false});render();};wrap.appendChild(rm);}
    return wrap;
  }
  if(t==="imggen"){
    if(d.status==="idle")return h("div",{style:{color:"#1e3a5f",fontSize:"12px",textAlign:"center",padding:"18px 0"}},"Run pipeline to generate");
    if(d.status==="loading")return h("div",{style:{color:"#06b6d4",fontSize:"12px",textAlign:"center",padding:"18px 0"}},"⏳ Generating image…");
    if(d.status==="error")return h("div",{style:{color:"#ef4444",fontSize:"12px",textAlign:"center",padding:"12px 0"}},"❌ Error — check log");
    if(d.status==="done"&&d.imgUrl){
      const wrap=h("div",{});
      const img=h("img",{src:d.imgUrl,style:{width:"100%",borderRadius:"8px",display:"block"}});
      wrap.appendChild(img);
      const dl=h("button",{class:"btn",style:{marginTop:"6px",width:"100%",background:"#0a1628",border:"1px solid #1e3455",color:"#64748b",padding:"5px"}},"⬇ Download");
      dl.onclick=()=>{const a=document.createElement("a");a.href=d.imgUrl;a.download="image.png";a.click();};
      wrap.appendChild(dl);return wrap;
    }
  }
  if(t==="videogen"){
    if(d.status==="idle")return h("div",{style:{color:"#1e3a5f",fontSize:"12px",textAlign:"center",padding:"18px 0"}},"Run pipeline to generate");
    if(d.status==="loading"){const wrap=h("div",{style:{textAlign:"center",padding:"18px 0"}});wrap.appendChild(h("div",{style:{color:"#f97316",fontSize:"12px"}},"⏳ Rendering video…"));wrap.appendChild(h("div",{style:{color:"#475569",fontSize:"10px",marginTop:"4px"}},"May take 1–5 min"));return wrap;}
    if(d.status==="error")return h("div",{style:{color:"#ef4444",fontSize:"12px",textAlign:"center",padding:"12px 0"}},"❌ Error — check log");
    if(d.status==="done"&&d.videoUrl){
      const wrap=h("div",{});
      const vid=document.createElement("video");vid.src=d.videoUrl;vid.controls=true;Object.assign(vid.style,{width:"100%",borderRadius:"8px"});
      wrap.appendChild(vid);
      const dl=h("a",{href:d.videoUrl,download:"video.mp4",style:{display:"block",marginTop:"6px",padding:"5px",background:"#0a1628",border:"1px solid #1e3455",color:"#64748b",borderRadius:"6px",fontSize:"10px",textAlign:"center",textDecoration:"none"}},"⬇ Download");
      wrap.appendChild(dl);return wrap;
    }
  }
  return h("div",{},"");
}

    <pattern id="sg" width="${20*z}" height="${20*z}" patternUnits="userSpaceOnUse" x="${px%(20*z)}" y="${py%(20*z)}">

    <pattern id="lg" width="${100*z}" height="${100*z}" patternUnits="userSpaceOnUse" x="${px%(100*z)}" y="${py%(100*z)}">
      <rect width="${100*z}" height="${100*z}" fill="url(#sg)"/>
      <path d="M${100*z} 0L0 0 0 ${100*z}" fill="none" stroke="#0d2040" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#lg)"/>`;
  cw.appendChild(gsvg);

  // Transform group
  const tg=h("div",{style:{position:"absolute",transformOrigin:"0 0",transform:"translate("+px+"px,"+py+"px) scale("+z+")"}});

  // Edges SVG
  const esvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  esvg.setAttribute("style","position:absolute;left:-5000px;top:-5000px;width:12000px;height:12000px;pointer-events:none;overflow:visible");
  const eg=document.createElementNS("http://www.w3.org/2000/svg","g");
  eg.setAttribute("transform","translate(5000,5000)");
  state.edges.forEach(e=>{
    const fn=state.nodes.find(n=>n.id===e.from),tn=state.nodes.find(n=>n.id===e.to);
    if(!fn||!tn)return;
    const s=portPos(fn,"out"),t=portPos(tn,"in"),mx=(s.x+t.x)/2;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d","M"+s.x+","+s.y+" C"+mx+","+s.y+" "+mx+","+t.y+" "+t.x+","+t.y);
    path.setAttribute("stroke","#1e3a5f");path.setAttribute("stroke-width",2/z);path.setAttribute("fill","none");path.setAttribute("stroke-dasharray",(6/z)+","+(3/z));
    eg.appendChild(path);
    // hitbox for delete

    hit.setAttribute("d","M"+s.x+","+s.y+" C"+mx+","+s.y+" "+mx+","+t.y+" "+t.x+","+t.y);
    hit.setAttribute("stroke","transparent");hit.setAttribute("stroke-width",14/z);hit.setAttribute("fill","none");hit.style.cursor="pointer";
    hit.ondblclick=()=>{state.edges=state.edges.filter(x=>x.id!==e.id);render();};
    eg.appendChild(hit);
  });
  // live wire
  if(state.wire){
    const w=state.wire,mx=(w.x1+w.x2)/2;
    const wp=document.createElementNS("http://www.w3.org/2000/svg","path");
    wp.setAttribute("d","M"+w.x1+","+w.y1+" C"+mx+","+w.y1+" "+mx+","+w.y2+" "+w.x2+","+w.y2);
    wp.setAttribute("stroke","#6366f1");wp.setAttribute("stroke-width",2/z);wp.setAttribute("fill","none");wp.setAttribute("stroke-dasharray",(4/z)+","+(2/z));wp.setAttribute("opacity","0.8");
    eg.appendChild(wp);
  }
  esvg.appendChild(eg);tg.appendChild(esvg);

  // Nodes
  state.nodes.forEach(n=>{const el=renderNode(n);if(el)tg.appendChild(el);});
  cw.appendChild(tg);

  // Canvas events
  cw.ondblclick=e=>{
    if(e.target.closest&&e.target.closest(".node"))return;
    const rect=cw.getBoundingClientRect();
    const cv=toCanvas(e.clientX-rect.left,e.clientY-rect.top);
    state.ctxMenu={x:e.clientX,y:e.clientY,cx:cv.x,cy:cv.y};render();
  };
  cw.onmousedown=e=>{
    if(e.target.closest&&e.target.closest(".node"))return;

  };
  cw.onwheel=e=>{
    e.preventDefault();

  };

  if(state.modelPicker){
    const nd=state.nodes.find(n=>n.id===state.modelPicker.nodeId);
    const mmap=state.modelPicker.kind==="imggen"?IMG_MODELS:VID_MODELS;
    const mp=h("div",{class:"model-picker"});

    Object.entries(mmap).forEach(([k,m])=>{

      const info=h("div",{style:{flex:"1"}});

      info.appendChild(h("div",{style:{fontSize:"10px",color:"#475569"}},m.prov));
      row.appendChild(info);

      row.onclick=()=>{updNode(state.modelPicker.nodeId,{model:k,status:"idle",imgUrl:"",videoUrl:""});state.modelPicker=null;render();};
      mp.appendChild(row);

    const cancRow=h("div",{style:{borderTop:"1px solid #1e3455",marginTop:"4px",padding:"6px 12px"}});

    cancBtn.onclick=()=>{state.modelPicker=null;render();};
    cancRow.appendChild(cancBtn);mp.appendChild(cancRow);
    mp.onmousedown=e=>e.stopPropagation();
    app.appendChild(mp);
  }

  // ── Log panel ──
  const lp=h("div",{class:"log-panel"});
  const lhdr=h("div",{style:{padding:"6px 10px",borderBottom:"1px solid #0d1e33",fontSize:"9px",color:"#334155",fontWeight:"700",letterSpacing:"1px",display:"flex",justifyContent:"space-between"}},
    h("span",{},"ACTIVITY LOG"),
    h("span",{style:{cursor:"pointer",color:"#1e3455"}},"clear")
  );
  lhdr.querySelector("span:last-child").onclick=()=>{state.log=[];render();};
  lp.appendChild(lhdr);
  const lb=h("div",{style:{maxHeight:"110px",overflow:"auto",padding:"4px 10px",display:"flex",flexDirection:"column",gap:"2px"}});
  if(!state.log.length)lb.appendChild(h("div",{style:{color:"#0d1e33",fontSize:"10px",textAlign:"center",padding:"8px 0"}},"No activity yet"));
  [...state.log].reverse().forEach(l=>lb.appendChild(h("div",{style:{fontSize:"10px",color:"#334155",lineHeight:"1.5"}},h("span",{style:{color:"#1e3455",marginRight:"4px"}},l.t),l.m)));
  lp.appendChild(lb);
  app.appendChild(lp);
}

// ── Global mouse events ───────────────────────────────────────────────────────
window.onmousemove=e=>{
  if(panStart){state.pan={x:panStart.px+(e.clientX-panStart.mx),y:panStart.py+(e.clientY-panStart.my)};render();}
  if(dragNode){
    const d=dragOrig;
    state.nodes=state.nodes.map(n=>n.id===dragNode?Object.assign({},n,{x:d.ox+(e.clientX-d.mx)/state.zoom,y:d.oy+(e.clientY-d.my)/state.zoom}):n);
    render();
  }
  if(wireStart&&state.wire){
    const cw=document.getElementById("canvas");
    if(cw){const rect=cw.getBoundingClientRect();const cv=toCanvas(e.clientX-rect.left,e.clientY-rect.top);state.wire=Object.assign({},state.wire,{x2:cv.x,y2:cv.y});render();}
  }
};
window.onmouseup=e=>{
  panStart=null;dragNode=null;dragOrig=null;
  if(wireStart&&state.wire){
    const cw=document.getElementById("canvas");
    if(cw){
      const rect=cw.getBoundingClientRect();
      const cv=toCanvas(e.clientX-rect.left,e.clientY-rect.top);
      const tgt=state.nodes.find(n=>{const pp=portPos(n,"in");return Math.hypot(cv.x-pp.x,cv.y-pp.y)<22&&n.id!==wireStart.fromNode;});
      if(tgt){const already=state.edges.find(x=>x.from===wireStart.fromNode&&x.to===tgt.id);if(!already)state.edges=[...state.edges,{id:"e"+Date.now(),from:wireStart.fromNode,to:tgt.id}];}
    }
    wireStart=null;state.wire=null;render();
  }
};

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
